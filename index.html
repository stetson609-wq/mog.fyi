<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Mog FYI – Exact Face Score Replica</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0c12;
            font-family: 'SF Mono', 'Fira Code', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 700px;
            width: 100%;
            background: #101219;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5);
        }
        .video-wrapper {
            position: relative;
            aspect-ratio: 4/5;
            background: black;
        }
        video, canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        canvas {
            pointer-events: none;
        }
        .panel {
            padding: 20px;
            background: rgba(12,14,20,0.97);
        }
        .score-main {
            font-size: 64px;
            font-weight: 800;
            color: #4ade80;
            font-family: monospace;
            letter-spacing: 2px;
        }
        .signal-bar {
            height: 5px;
            background: #1a1c24;
            border-radius: 5px;
            margin: 12px 0;
            overflow: hidden;
        }
        .signal-fill {
            height: 100%;
            width: 0%;
            transition: width 0.15s ease;
        }
        .signal-fill.good { background: #4ade80; }
        .signal-fill.bad { background: #f87171; }
        .signal-label {
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 4px;
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            background: #1e2029;
            color: #aaa;
        }
        .diagnosis-box {
            margin: 20px 0;
            padding: 15px;
            background: #1a1c24;
            border-radius: 8px;
            font-size: 12px;
        }
        .diagnosis-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid #2a2c34;
        }
        .diagnosis-item:last-child { border: none; }
        .good { color: #4ade80; }
        .medium { color: #fbbf24; }
        .bad { color: #f87171; }
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px,1fr));
            gap: 10px;
            margin-top: 15px;
        }
        .metric-card {
            background: #1a1c24;
            padding: 8px;
            border-radius: 6px;
            font-size: 11px;
        }
        .metric-name {
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .metric-value {
            font-size: 20px;
            font-weight: bold;
            margin-top: 4px;
        }
        .note {
            font-size: 10px;
            color: #666;
            text-align: center;
            margin-top: 15px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="video-wrapper">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas"></canvas>
    </div>
    <div class="panel">
        <div class="score-main" id="score">--</div>

        <div class="signal-bar">
            <div class="signal-fill good" id="strongBar" style="width:0%"></div>
        </div>
        <div id="strongLabel" class="signal-label">—</div>

        <div class="signal-bar">
            <div class="signal-fill bad" id="weakBar" style="width:0%"></div>
        </div>
        <div id="weakLabel" class="signal-label">—</div>

        <div class="diagnosis-box" id="diagnosis"></div>
        <div class="metrics-grid" id="metrics"></div>
        <div class="note">Same weights & falloff as original mog.fyi</div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.js"></script>
<script>
    // ---------- Exact weights from original ----------
    const WEIGHTS = {
        symmetry: 0.24,
        harmony: 0.18,
        jaw: 0.14,
        midface: 0.14,
        canthalTilt: 0.12,
        cheek: 0.10,
        eyeShape: 0.08
    };

    // ---------- "Good band" falloff function (smooth from 0 to 1) ----------
    // Full credit between low and high, then linear falloff to 0 outside [min,max]
    function goodBand(value, minIdeal, maxIdeal, minAllowed = 0.2, maxAllowed = 0.9) {
        if (value <= minAllowed) return 0;
        if (value >= maxAllowed) return 0;
        if (value >= minIdeal && value <= maxIdeal) return 1;
        if (value < minIdeal) return (value - minAllowed) / (minIdeal - minAllowed);
        return (maxAllowed - value) / (maxAllowed - maxIdeal);
    }

    // ---------- Geometric helpers ----------
    function distance(p1, p2) {
        const dx = p1.x - p2.x;
        const dy = p1.y - p2.y;
        return Math.hypot(dx, dy);
    }

    function angle(p1, p2) {
        return Math.atan2(p2.y - p1.y, p2.x - p1.x) * 180 / Math.PI;
    }

    // ---------- Face metrics from landmarks (MediaPipe 478 points) ----------
    function computeMetrics(landmarks, imgW, imgH) {
        // Helper to get landmark by index
        const lm = (idx) => landmarks[idx];

        // ---- Symmetry (24%) : compare left/right eye & brow positions ----
        const leftEye = lm(33), rightEye = lm(263);
        const leftBrow = lm(55), rightBrow = lm(285);
        const eyeDiff = Math.abs(leftEye.x - rightEye.x);
        const browDiff = Math.abs(leftBrow.y - rightBrow.y);
        const rawSym = 1 - ((eyeDiff + browDiff) / 2);
        const symmetryScore = goodBand(rawSym, 0.72, 0.88, 0.5, 0.98);

        // ---- Jaw (14%) : width between jaw corners (landmarks 132, 361) ----
        const jawL = lm(132), jawR = lm(361);
        const jawWidth = distance(jawL, jawR);
        const normJawWidth = jawWidth / imgW;
        const jawScore = goodBand(normJawWidth, 0.22, 0.32, 0.12, 0.45);

        // ---- Midface (14%) : ratio of nose-to-mouth vs total face height ----
        const noseTip = lm(1), upperLip = lm(13);
        const eyeCenter = { x: (lm(33).x + lm(263).x)/2, y: (lm(33).y + lm(263).y)/2 };
        const chin = lm(152);
        const midfaceLen = distance(noseTip, upperLip);
        const totalLen = distance(eyeCenter, chin);
        const rawMid = midfaceLen / (totalLen + 0.001);
        const midfaceScore = goodBand(rawMid, 0.32, 0.42, 0.18, 0.58);

        // ---- Canthal Tilt (12%) : angle of outer vs inner eye ----
        const leftInner = lm(133), leftOuter = lm(33);
        const rightInner = lm(362), rightOuter = lm(263);
        const leftTilt = angle(leftInner, leftOuter);
        const rightTilt = angle(rightInner, rightOuter);
        const avgTilt = (leftTilt + rightTilt) / 2;
        // ideal: -1° to 3° (negative = hunter, positive = prey) – mog prefers negative
        const tiltScore = goodBand(avgTilt, -3, 2, -12, 12);
        const canthalScore = Math.min(1, Math.max(0, tiltScore));

        // ---- Cheek (10%) : zygomatic projection (landmark 235 distance from nose) ----
        const cheek = lm(235), nose = lm(1);
        const cheekProj = Math.abs(cheek.x - nose.x) / imgW;
        const cheekScore = goodBand(cheekProj, 0.09, 0.16, 0.03, 0.28);

        // ---- Eye Shape (8%) : openness (vertical distance between upper/lower eyelid) ----
        const leftUpper = lm(159), leftLower = lm(23);
        const rightUpper = lm(386), rightLower = lm(253);
        const leftOpen = distance(leftUpper, leftLower);
        const rightOpen = distance(rightUpper, rightLower);
        const avgOpen = (leftOpen + rightOpen) / 2 / imgH;
        const eyeScore = goodBand(avgOpen, 0.022, 0.038, 0.008, 0.065);

        // ---- Harmony (18%) : composite of jaw, midface, cheek, eye spacing ----
        // Use multiple cues: jaw width, midface ratio, cheek projection, eye-to-mouth distance
        const eyeToMouth = distance(eyeCenter, upperLip) / imgH;
        const harmonyRaw = (jawScore + midfaceScore + cheekScore + (1 - Math.abs(eyeToMouth - 0.28))) / 4;
        const harmonyScore = goodBand(harmonyRaw, 0.65, 0.85, 0.25, 0.98);

        // Final aggregated score (0-1) before framing guard
        let Z = (symmetryScore * WEIGHTS.symmetry) +
                (harmonyScore * WEIGHTS.harmony) +
                (jawScore * WEIGHTS.jaw) +
                (midfaceScore * WEIGHTS.midface) +
                (canthalScore * WEIGHTS.canthalTilt) +
                (cheekScore * WEIGHTS.cheek) +
                (eyeScore * WEIGHTS.eyeShape);

        Z = Math.min(0.99, Math.max(0.01, Z));

        return {
            Z,
            symmetry: symmetryScore,
            harmony: harmonyScore,
            jaw: jawScore,
            midface: midfaceScore,
            canthal: canthalScore,
            cheek: cheekScore,
            eye: eyeScore,
            raw: { symmetryRaw: rawSym, canthalAngle: avgTilt, jawWidth: normJawWidth, midfaceRatio: rawMid }
        };
    }

    // ---------- Framing guard (pose quality) ----------
    // 3 factors: centering, face size, roll (head tilt)
    function framingGuard(landmarks, imgW, imgH) {
        const faceCenter = { x: landmarks[1].x, y: landmarks[1].y };
        const imageCenter = { x: 0.5, y: 0.5 };
        const centering = 1 - (Math.hypot(faceCenter.x - imageCenter.x, faceCenter.y - imageCenter.y) / 0.5);
        const leftEye = landmarks[33], rightEye = landmarks[263];
        const faceWidth = Math.hypot(leftEye.x - rightEye.x, leftEye.y - rightEye.y);
        const faceSize = Math.min(1, faceWidth / 0.3); // ideal width 0.3 of image
        const roll = Math.abs(angle(leftEye, rightEye));
        let quality = (centering * 0.4) + (Math.min(1, faceSize) * 0.4) + (1 - Math.min(1, roll / 20) * 0.2);
        return Math.min(1, Math.max(0.2, quality));
    }

    // ---------- Main app ----------
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const strongBar = document.getElementById('strongBar');
    const weakBar = document.getElementById('weakBar');
    const strongLabel = document.getElementById('strongLabel');
    const weakLabel = document.getElementById('weakLabel');
    const diagnosisDiv = document.getElementById('diagnosis');
    const metricsDiv = document.getElementById('metrics');

    let faceLandmarker = null;
    let lastScore = 50;
    let frameCount = 0;
    let animationId = null;

    async function initFaceLandmarker() {
        const vision = await FilesetResolver.forVisionTasks(
            "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/wasm"
        );
        faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
            baseOptions: {
                modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
                delegate: "GPU"
            },
            outputFaceBlendshapes: false,
            numFaces: 1,
            runningMode: "VIDEO"
        });
        console.log("FaceLandmarker ready");
        detectLoop();
    }

    function detectLoop() {
        if (!faceLandmarker || video.readyState < 2) {
            requestAnimationFrame(detectLoop);
            return;
        }
        const startTimeMs = performance.now();
        const results = faceLandmarker.detectForVideo(video, startTimeMs);
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        if (results.faceLandmarks && results.faceLandmarks.length > 0) {
            const landmarks = results.faceLandmarks[0];
            const imgW = canvas.width, imgH = canvas.height;
            
            const metrics = computeMetrics(landmarks, imgW, imgH);
            const quality = framingGuard(landmarks, imgW, imgH);
            let finalScore = metrics.Z * quality * 100;
            finalScore = Math.min(99, Math.max(20, finalScore));
            lastScore = Math.floor(finalScore);
            
            scoreEl.innerText = `${lastScore}/100`;
            
            // Determine strong & weak signals based on highest/lowest channel scores
            const channelScores = [
                { name: "Strong Jawline", score: metrics.jaw, type: "good" },
                { name: "Hunter Eyes", score: metrics.canthal, type: "good" },
                { name: "High Symmetry", score: metrics.symmetry, type: "good" },
                { name: "Defined Cheeks", score: metrics.cheek, type: "good" },
                { name: "Almond Eyes", score: metrics.eye, type: "good" },
                { name: "Balanced Midface", score: metrics.midface, type: "good" },
                { name: "Weak Jaw", score: 1 - metrics.jaw, type: "bad" },
                { name: "Positive Canthal Tilt", score: 1 - metrics.canthal, type: "bad" },
                { name: "Asymmetry", score: 1 - metrics.symmetry, type: "bad" },
                { name: "Flat Cheeks", score: 1 - metrics.cheek, type: "bad" },
                { name: "Round Eyes", score: 1 - metrics.eye, type: "bad" },
                { name: "Elongated Midface", score: 1 - metrics.midface, type: "bad" }
            ];
            channelScores.sort((a,b) => b.score - a.score);
            const strong = channelScores.find(c => c.type === "good" && c.score > 0.65) || channelScores[0];
            const weak = channelScores.find(c => c.type === "bad" && c.score > 0.55) || channelScores[channelScores.length-1];
            strongLabel.innerText = strong.name;
            weakLabel.innerText = weak.name;
            strongBar.style.width = `${strong.score * 100}%`;
            weakBar.style.width = `${weak.score * 100}%`;
            
            // Diagnosis lines (recessed maxilla, jaw rotation, etc)
            const recessedScore = metrics.midface > 0.6 ? "Mild Recessed Maxilla" : (metrics.midface > 0.45 ? "Normal Maxilla" : "Severe Recessed Maxilla");
            const recessedClass = metrics.midface > 0.6 ? "bad" : (metrics.midface > 0.45 ? "medium" : "bad");
            const jawRotation = metrics.jaw > 0.7 ? "Upswung Jaw" : (metrics.jaw < 0.4 ? "Downgrown Jaw" : "Normal Rotation");
            const jawClass = metrics.jaw > 0.7 ? "good" : (metrics.jaw < 0.4 ? "bad" : "medium");
            const tiltStatus = metrics.canthal > 0.6 ? "Negative Canthal Tilt (Hunter)" : (metrics.canthal < 0.3 ? "Positive Tilt (Prey)" : "Neutral Tilt");
            const tiltClass = metrics.canthal > 0.6 ? "good" : (metrics.canthal < 0.3 ? "bad" : "medium");
            
            diagnosisDiv.innerHTML = `
                <div class="diagnosis-item"><span>🦴 Maxilla:</span><span class="${recessedClass}">${recessedScore}</span></div>
                <div class="diagnosis-item"><span>🦷 Jaw Rotation:</span><span class="${jawClass}">${jawRotation}</span></div>
                <div class="diagnosis-item"><span>👁️ Canthal Tilt:</span><span class="${tiltClass}">${tiltStatus}</span></div>
                <div class="diagnosis-item"><span>⚡ Jaw Definition:</span><span class="${metrics.jaw>0.6?'good':'medium'}">${Math.round(metrics.jaw*100)}%</span></div>
                <div class="diagnosis-item"><span>📏 Midface Ratio:</span><span class="${metrics.midface>0.5?'medium':'bad'}">${metrics.raw.midfaceRatio.toFixed(2)}</span></div>
            `;
            
            metricsDiv.innerHTML = `
                <div class="metric-card"><div class="metric-name">SYMMETRY</div><div class="metric-value ${metrics.symmetry>0.6?'good':'medium'}">${Math.round(metrics.symmetry*100)}%</div></div>
                <div class="metric-card"><div class="metric-name">HARMONY</div><div class="metric-value ${metrics.harmony>0.6?'good':'medium'}">${Math.round(metrics.harmony*100)}%</div></div>
                <div class="metric-card"><div class="metric-name">JAW</div><div class="metric-value ${metrics.jaw>0.6?'good':'medium'}">${Math.round(metrics.jaw*100)}%</div></div>
                <div class="metric-card"><div class="metric-name">MIDFACE</div><div class="metric-value ${metrics.midface>0.5?'medium':'bad'}">${Math.round(metrics.midface*100)}%</div></div>
                <div class="metric-card"><div class="metric-name">CANTHAL TILT</div><div class="metric-value ${metrics.canthal>0.6?'good':'bad'}">${Math.round(metrics.canthal*100)}%</div></div>
                <div class="metric-card"><div class="metric-name">CHEEK</div><div class="metric-value ${metrics.cheek>0.6?'good':'medium'}">${Math.round(metrics.cheek*100)}%</div></div>
                <div class="metric-card"><div class="metric-name">EYE SHAPE</div><div class="metric-value ${metrics.eye>0.6?'good':'medium'}">${Math.round(metrics.eye*100)}%</div></div>
            `;
            
            // Draw landmarks
            for (let pt of landmarks) {
                ctx.fillStyle = '#4ade80';
                ctx.beginPath();
                ctx.arc(pt.x * canvas.width, pt.y * canvas.height, 2, 0, 2*Math.PI);
                ctx.fill();
            }
        } else {
            scoreEl.innerText = "--";
            strongLabel.innerText = "No face detected";
            weakLabel.innerText = "Center your face";
        }
        
        requestAnimationFrame(detectLoop);
    }

    // Start camera and init
    navigator.mediaDevices.getUserMedia({ video: true })
        .then(stream => {
            video.srcObject = stream;
            video.play();
            video.addEventListener('loadedmetadata', () => {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                initFaceLandmarker();
            });
        })
        .catch(err => {
            console.error("Camera error:", err);
            scoreEl.innerText = "ERR";
            strongLabel.innerText = "Camera blocked";
            weakLabel.innerText = "Allow permissions";
        });
</script>
</body>
</html>
