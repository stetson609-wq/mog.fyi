<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MediaPipe Face Mesh • Aimbot Precision Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0f1e;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Courier New', monospace;
        }
        .container {
            position: relative;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5), 0 0 0 2px rgba(0,255,255,0.2);
        }
        video, canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        canvas {
            pointer-events: none;
        }
        #output {
            position: relative;
            width: 100vw;
            max-width: 1000px;
            aspect-ratio: 4 / 3;
            margin: auto;
            background: #000;
        }
        .status {
            position: absolute;
            bottom: 16px;
            left: 16px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            color: #0f0;
            font-family: monospace;
            font-size: 14px;
            padding: 6px 12px;
            border-radius: 40px;
            z-index: 10;
            border-left: 3px solid #0f0;
            letter-spacing: 0.5px;
        }
        .fps {
            position: absolute;
            bottom: 16px;
            right: 16px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            color: cyan;
            font-family: monospace;
            font-size: 14px;
            padding: 6px 12px;
            border-radius: 40px;
            z-index: 10;
            font-weight: bold;
        }
        .instruction {
            position: absolute;
            top: 16px;
            left: 16px;
            background: rgba(0,0,0,0.6);
            color: white;
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 20px;
            font-family: monospace;
            z-index: 10;
            pointer-events: none;
        }
        @media (max-width: 600px) {
            .status, .fps, .instruction { font-size: 10px; padding: 4px 8px; }
        }
    </style>
</head>
<body>
<div class="container" id="output">
    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="overlayCanvas"></canvas>
    <div class="status">🔒 FACE LOCK [ AIMBOT ACTIVE ]</div>
    <div class="fps">⚡ 0 FPS</div>
    <div class="instruction">📌 FACE STICK MODE • ZERO LATENCY TRACKING</div>
</div>

<!-- MediaPipe face_mesh + camera utils -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

<script>
    (function(){
        // ---------- ultra precise face tracking ----------
        const videoElement = document.getElementById('webcam');
        const canvasElement = document.getElementById('overlayCanvas');
        const ctx = canvasElement.getContext('2d');
        
        let faceMesh = null;
        let camera = null;
        let lastTimestamp = 0;
        let frameCount = 0;
        let fps = 0;
        
        // dimensions
        let canvasWidth = 0, canvasHeight = 0;
        
        // locking visualization: tight bounding circle that sticks to face center (nose bridge index 1)
        // we use landmark 1 (nose bridge) and 168 (nose tip region) + full face bounding for aimbot style
        // for "aimbot accuracy" we compute the center of face (average of key central points)
        // and draw a high-precision reticle that NEVER leaves the face.
        
        function getFaceCenter(landmarks, dimensions) {
            // Use multiple stable landmarks: nose tip (1), chin (152), left eye corner (33), right eye corner (263)
            // this creates a dead-center stabilization that mimics aimbot.
            const indices = [1, 152, 33, 263, 168, 6];  // nose bridge, chin, left eye, right eye, nose tip, right eyebrow center
            let sumX = 0, sumY = 0;
            let count = 0;
            for(let idx of indices) {
                if(landmarks[idx]) {
                    sumX += landmarks[idx].x * dimensions.width;
                    sumY += landmarks[idx].y * dimensions.height;
                    count++;
                }
            }
            if(count === 0) return null;
            return { x: sumX / count, y: sumY / count };
        }
        
        function getFaceBoundingBox(landmarks, dimensions, paddingFactor = 0.22) {
            // get min/max of all landmarks for a tight box (aimbot wall)
            let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
            for(let lm of landmarks) {
                const x = lm.x * dimensions.width;
                const y = lm.y * dimensions.height;
                if(x < minX) minX = x;
                if(x > maxX) maxX = x;
                if(y < minY) minY = y;
                if(y > maxY) maxY = y;
            }
            const width = maxX - minX;
            const height = maxY - minY;
            const padX = width * paddingFactor;
            const padY = height * paddingFactor;
            return {
                x: Math.max(0, minX - padX),
                y: Math.max(0, minY - padY),
                w: Math.min(dimensions.width - (minX - padX), width + padX * 2),
                h: Math.min(dimensions.height - (minY - padY), height + padY * 2)
            };
        }
        
        function drawAimbotOverlay(landmarks, dimensions) {
            if(!landmarks || landmarks.length === 0) return;
            
            ctx.clearRect(0, 0, dimensions.width, dimensions.height);
            
            // 1) ultra tight bounding box (smooth lock)
            const bbox = getFaceBoundingBox(landmarks, dimensions, 0.18);
            ctx.save();
            ctx.shadowBlur = 0;
            ctx.strokeStyle = "#ff3366";
            ctx.lineWidth = 3;
            ctx.shadowColor = "rgba(255,0,100,0.6)";
            ctx.strokeRect(bbox.x, bbox.y, bbox.w, bbox.h);
            
            // inner glint
            ctx.strokeStyle = "rgba(0, 255, 255, 0.9)";
            ctx.lineWidth = 1.5;
            ctx.strokeRect(bbox.x + 2, bbox.y + 2, bbox.w - 4, bbox.h - 4);
            
            // 2) center aim dot (aimbot crosshair that never drifts)
            const center = getFaceCenter(landmarks, dimensions);
            if(center) {
                // outer ring
                ctx.beginPath();
                ctx.arc(center.x, center.y, 16, 0, 2 * Math.PI);
                ctx.strokeStyle = "#00ffcc";
                ctx.lineWidth = 2.5;
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(center.x, center.y, 8, 0, 2 * Math.PI);
                ctx.strokeStyle = "#ff44aa";
                ctx.stroke();
                // inner dot
                ctx.beginPath();
                ctx.arc(center.x, center.y, 3, 0, 2 * Math.PI);
                ctx.fillStyle = "#ff0000";
                ctx.fill();
                ctx.fillStyle = "white";
                ctx.beginPath();
                ctx.arc(center.x, center.y, 1.2, 0, 2 * Math.PI);
                ctx.fill();
                
                // crosshair lines
                ctx.beginPath();
                ctx.moveTo(center.x - 28, center.y);
                ctx.lineTo(center.x - 12, center.y);
                ctx.moveTo(center.x + 12, center.y);
                ctx.lineTo(center.x + 28, center.y);
                ctx.moveTo(center.x, center.y - 28);
                ctx.lineTo(center.x, center.y - 12);
                ctx.moveTo(center.x, center.y + 12);
                ctx.lineTo(center.x, center.y + 28);
                ctx.strokeStyle = "#ffffffcc";
                ctx.lineWidth = 2;
                ctx.stroke();
            }
            
            // 3) draw key facial landmarks (tiny dots for precision feedback)
            for(let i = 0; i < landmarks.length; i++) {
                const x = landmarks[i].x * dimensions.width;
                const y = landmarks[i].y * dimensions.height;
                if(i % 15 === 0) {  // draw subset for performance but still feels aimbot detailed
                    ctx.beginPath();
                    ctx.arc(x, y, 1.2, 0, 2 * Math.PI);
                    ctx.fillStyle = "#66ff66";
                    ctx.fill();
                }
            }
            
            // additional "laser lock" effect: line from center to top of head (landmark 10)
            if(landmarks[10] && center) {
                const topX = landmarks[10].x * dimensions.width;
                const topY = landmarks[10].y * dimensions.height;
                ctx.beginPath();
                ctx.moveTo(center.x, center.y);
                ctx.lineTo(topX, topY);
                ctx.strokeStyle = "rgba(0, 255, 255, 0.5)";
                ctx.lineWidth = 1.8;
                ctx.stroke();
            }
            ctx.restore();
        }
        
        // FPS counter
        function updateFPS(now) {
            frameCount++;
            if(now - lastTimestamp >= 1000) {
                fps = frameCount;
                frameCount = 0;
                lastTimestamp = now;
                const fpsElem = document.querySelector('.fps');
                if(fpsElem) fpsElem.innerText = `⚡ ${fps} FPS`;
            }
            requestAnimationFrame((t) => updateFPS(t));
        }
        
        // resize canvas to match video feed
        function resizeCanvas() {
            if(videoElement.videoWidth && videoElement.videoHeight) {
                canvasWidth = videoElement.videoWidth;
                canvasHeight = videoElement.videoHeight;
                canvasElement.width = canvasWidth;
                canvasElement.height = canvasHeight;
                canvasElement.style.width = `${canvasWidth}px`;
                canvasElement.style.height = `${canvasHeight}px`;
                const container = document.getElementById('output');
                container.style.width = '100%';
                container.style.maxWidth = `${canvasWidth}px`;
                container.style.aspectRatio = `${canvasWidth} / ${canvasHeight}`;
            }
        }
        
        // MediaPipe results callback
        function onFaceMeshResults(results) {
            if(!canvasElement || !ctx) return;
            if(canvasWidth === 0 || canvasHeight === 0) {
                resizeCanvas();
                return;
            }
            if(results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                // take the most dominant face (first)
                const landmarks = results.multiFaceLandmarks[0];
                const dimensions = { width: canvasWidth, height: canvasHeight };
                drawAimbotOverlay(landmarks, dimensions);
            } else {
                // no face: clear canvas and show hint
                ctx.clearRect(0, 0, canvasWidth, canvasHeight);
                ctx.font = "bold 18px monospace";
                ctx.fillStyle = "#ff6666";
                ctx.shadowBlur = 0;
                ctx.fillText("⚠️ NO TARGET — FACE NOT DETECTED", canvasWidth/2 - 180, canvasHeight/2);
            }
        }
        
        // initialize face mesh with maximum detection accuracy
        function initFaceMesh() {
            faceMesh = new FaceMesh({
                locateFile: (file) => {
                    return `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`;
                }
            });
            
            // Settings for aimbot-level precision:
            // maxNumFaces: 1 (dedicated lock)
            // refineLandmarks: true -> adds iris landmarks, tighter tracking
            // minDetectionConfidence: 0.5 -> faster response
            // minTrackingConfidence: 0.5 -> sticky tracking
            faceMesh.setOptions({
                maxNumFaces: 1,
                refineLandmarks: true,
                minDetectionConfidence: 0.5,
                minTrackingConfidence: 0.5
            });
            
            faceMesh.onResults(onFaceMeshResults);
        }
        
        // start camera
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { width: { ideal: 1280 }, height: { ideal: 720 }, facingMode: "user" } });
                videoElement.srcObject = stream;
                await new Promise((resolve) => {
                    videoElement.onloadedmetadata = () => {
                        videoElement.play();
                        resolve();
                    };
                });
                resizeCanvas();
                // initialize camera utils
                camera = new Camera(videoElement, {
                    onFrame: async () => {
                        if(faceMesh) {
                            await faceMesh.send({ image: videoElement });
                        }
                    },
                    width: 1280,
                    height: 720
                });
                camera.start();
            } catch(err) {
                console.error("Camera error", err);
                ctx.font = "20px monospace";
                ctx.fillStyle = "red";
                ctx.fillText("❌ Camera access denied or error", 50, 100);
            }
        }
        
        // make canvas responsive on resize
        window.addEventListener('resize', () => {
            if(videoElement.videoWidth) {
                canvasWidth = videoElement.videoWidth;
                canvasHeight = videoElement.videoHeight;
                canvasElement.width = canvasWidth;
                canvasElement.height = canvasHeight;
            }
        });
        
        // kickstart
        initFaceMesh();
        startCamera();
        lastTimestamp = performance.now();
        requestAnimationFrame((t) => updateFPS(t));
        
        // extra smoothness: video frames may cause slight lag, but mediapipe handles.
        // forced aimbot level "stuck" due to immediate overlay update per frame.
    })();
</script>
</body>
</html>
